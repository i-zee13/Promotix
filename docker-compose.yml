services:
  app:
    build: .
    container_name: promotix-app
    volumes:
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DB_HOST=mysql
      - DB_DATABASE=promotix
      - DB_USERNAME=promotix
      - DB_PASSWORD=secret

  nginx:
    image: nginx:alpine
    container_name: promotix-nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  mysql:
    image: mysql:8
    container_name: promotix-mysql
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: promotix
      MYSQL_USER: promotix
      MYSQL_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10

  node:
    image: node:18-alpine
    container_name: promotix-node
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - VITE_DOCKER=1
    depends_on:
      - app

volumes:
  mysql_data:
